services:
  # ── Ollama ────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1 # one request at a time (optimal for single chatbot)
      - OLLAMA_MAX_LOADED_MODELS=1 # keep only one model in RAM
      - OLLAMA_KEEP_ALIVE=5m # unload model after 5 min idle to free RAM
    deploy:
      resources:
        limits:
          memory: 20G # leaves ~4 GB for OS + bot overhead

  # ── Model pull (runs once, then exits) ───────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama...';
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Pulling ${MODEL_NAME:-llama3:8b}...';
        ollama pull ${MODEL_NAME:-llama3:8b};
        echo 'Done.';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  # ── YouTube Chatbot API ───────────────────────────────────────────────────
  yt-chatbot:
    build:
      context: .
      dockerfile: api.Dockerfile
      platforms:
        - linux/arm64
    container_name: yt-chatbot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=${MODEL_NAME:-llama3:8b}
      - HISTORY_LENGTH=${HISTORY_LENGTH:-10}
      - PORT=3000
    volumes:
      - chatbot_data:/app/data
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  ollama_data:
  chatbot_data:
