services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=5m
    dns:
      - 1.1.1.1
      - 8.8.8.8
    deploy:
      resources:
        limits:
          memory: 20G

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama...';
        until ollama list > /dev/null 2>&1; do sleep 2; done;
        echo 'Pulling ${MODEL_NAME:-llama3.2:3b}...';
        ollama pull ${MODEL_NAME:-llama3.2:3b};
        echo 'Done.';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  yt-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-chatbot
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=${MODEL_NAME:-llama3.2:3b}
      - HISTORY_LENGTH=${HISTORY_LENGTH:-10}
      - PORT=3000
      - NIGHTBOT_TOKEN=${NIGHTBOT_TOKEN}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-20}
      - OLLAMA_TIMEOUT_MS=${OLLAMA_TIMEOUT_MS:-12000}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.6}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-96}
      - OLLAMA_REPEAT_PENALTY=${OLLAMA_REPEAT_PENALTY:-1.1}
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - yt-chatbot

volumes:
  ollama_data:
  caddy_data:
  caddy_config:
