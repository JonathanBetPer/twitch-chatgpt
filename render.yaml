services:
  - type: web
    name: yt-chatbot
    runtime: node
    branch: main
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OLLAMA_URL
        value: "http://localhost:11434"
      - key: MODEL_NAME
        value: "llama3"
      - key: HISTORY_LENGTH
        value: "10"
      - key: PORT
        value: "3000"
